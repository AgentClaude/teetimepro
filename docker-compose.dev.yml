# Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Adds volume mounts for hot-reload and swaps the production web container
# with Vite's dev server for HMR.

services:
  api:
    user: root
    volumes:
      - ./api:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
    command: >
      sh -c "
        rm -f /app/tmp/pids/server.pid &&
        bundle install --quiet &&
        bundle exec rails db:prepare &&
        bundle exec rails server -b 0.0.0.0 -p 3003
      "

  sidekiq:
    volumes:
      - ./api:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development

  web:
    image: node:22
    working_dir: /app
    volumes:
      - ./web:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3003
    ports: !override
      - "${WEB_PORT:-3004}:3004"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  bundle_cache:
    driver: local
  node_modules:
    driver: local
