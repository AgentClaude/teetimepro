name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # Only deploy if CI passes
  ci-check:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci-check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/teetimepro

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🔨 Building images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build api sidekiq web

            echo "🚀 Rolling restart..."
            # Restart API first
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps api
            sleep 15

            # Health check
            if curl -sf http://localhost:3003/health > /dev/null; then
              echo "✅ API healthy"
            else
              echo "❌ API unhealthy"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs api --tail 30
              exit 1
            fi

            # Restart remaining services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps sidekiq web nginx

            echo "🧹 Pruning old images..."
            docker image prune -f --filter "until=168h"

            echo "✅ Deploy complete"
