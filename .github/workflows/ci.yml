name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: Rails API — Build & Specs
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teetimepro_test
          POSTGRES_USER: teetimepro
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teetimepro -d teetimepro_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: teetimepro
      DB_PASSWORD: password
      DB_TEST_NAME: teetimepro_test
      DATABASE_URL: postgres://teetimepro:password@localhost:5432/teetimepro_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY_BASE: ci-test-secret-key-base
      JWT_SECRET_KEY: ci-test-jwt-secret
      BUNDLE_WITHOUT: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: api

      - name: Clear bootsnap cache
        run: rm -rf tmp/cache/bootsnap*

      - name: Setup database
        run: |
          mkdir -p log tmp
          bundle exec rails db:create db:schema:load

      - name: Run RSpec
        run: |
          bundle exec rspec --format progress --no-color

  web-build:
    name: React Frontend — Build & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings 0

      - name: Build
        run: npm run build
